name: media_bot

services:
  media_bot:
    # 默认使用 GitHub Actions 发布的远程镜像
    image: ghcr.io/268326/media_bot:latest
    # 本地联调时可切换为本地构建
    # build: .
    container_name: media_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./auth.json:/app/auth.json
    shm_size: '2gb'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
