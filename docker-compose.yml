name: media_bot

services:
  media_bot:
    # 生产：使用 GitHub Action 构建并推送的多架构镜像（amd64/arm64）
    image: ghcr.io/268326/media_bot:latest
    # 本地调试：改为使用本地构建（启用下面一行，并注释上面的 image）
    # build: .
    container_name: media_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./auth.json:/app/auth.json
    shm_size: '2gb'
