name: media_bot

services:
  media_bot:
    # 本地联调使用本地构建镜像
    build: .
    # 如需切回远程镜像，可改回:
    # image: ghcr.io/268326/media_bot:latest
    container_name: media_bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ${ASS_TARGET_HOST_DIR:-./data/ass_target}:${ASS_TARGET_DIR:-/ass_target}
      - ${ASS_MUX_TARGET_HOST_DIR:-./data/ass_mux_target}:${ASS_MUX_TARGET_DIR:-/ass_mux_target}
    shm_size: '2gb'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
